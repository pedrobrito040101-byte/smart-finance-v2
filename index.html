<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Finance v2</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Smart<span>Finance</span></h1>
            <div class="user-info">Pedro Dev</div>
        </header>

        <section class="balance">
            <div class="card">
                <h3>Entradas</h3>
                <p id="money-plus" class="money plus">+ R$ 0.00</p>
            </div>
            <div class="card">
                <h3>Saídas</h3>
                <p id="money-minus" class="money minus">- R$ 0.00</p>
            </div>
            <div class="card total">
                <h3>Saldo Total</h3>
                <p id="balance">R$ 0.00</p>
            </div>
        </section>

        <section class="transactions">
            <h2>Histórico</h2>
            <ul id="transactions" class="transactions-list"></ul>
        </section>

        <section class="add-transaction">
            <h2>Nova Transação</h2>
            <form id="form">
                <input type="text" id="text" placeholder="Nome (ex: Salário)" required>
                <input type="number" step="0.01" id="amount" placeholder="Valor (ex: 100 ou -50)" required>
                <button class="btn">Adicionar à Carteira</button>
            </form>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
